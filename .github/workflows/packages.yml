name: Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g., v1.0.0)
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

env:
  GO_VERSION: '1.26'

jobs:
  build-alpine:
    name: Build Alpine (musl static)
    runs-on: ubuntu-latest
    container: alpine:latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
          - arch: aarch64
            goarch: arm64
    steps:
      - name: Install dependencies
        run: apk add --no-cache git ca-certificates

      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build static binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -buildvcs=false -trimpath -ldflags="-s -w" -o screenshooter-mcp ./cmd/screenshooter-mcp-server

      - name: Create tar.gz (server)
        run: |
          mkdir -p screenshooter-mcp-${{ matrix.arch }}-server
          cp screenshooter-mcp screenshooter-mcp-${{ matrix.arch }}-server/
          mkdir -p screenshooter-mcp-${{ matrix.arch }}-server/etc/screenshooter-mcp
          mkdir -p screenshooter-mcp-${{ matrix.arch }}-server/usr/lib/sysusers
          cat > screenshooter-mcp-${{ matrix.arch }}-server/usr/lib/sysusers/screenshooter-mcp << 'SYSUSER'
          screenshooter-mcp:x:973:
          SYSUSER
          echo '{"log_level":"info","color":"auto","listen":"127.0.0.1:11777"}' > screenshooter-mcp-${{ matrix.arch }}-server/etc/screenshooter-mcp/config.json
          tar -czvf screenshooter-mcp-${{ matrix.arch }}-server.tar.gz screenshooter-mcp-${{ matrix.arch }}-server/

      - name: Create tar.gz (stdio)
        run: |
          mkdir -p screenshooter-mcp-${{ matrix.arch }}-stdio
          cp screenshooter-mcp screenshooter-mcp-${{ matrix.arch }}-stdio/
          tar -czvf screenshooter-mcp-${{ matrix.arch }}-stdio.tar.gz screenshooter-mcp-${{ matrix.arch }}-stdio/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpine-${{ matrix.arch }}
          path: |
            screenshooter-mcp-${{ matrix.arch }}-server.tar.gz
            screenshooter-mcp-${{ matrix.arch }}-stdio.tar.gz


  build-debian:
    name: Build Debian
    runs-on: ubuntu-latest
    container: debian:bookworm-slim
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y ruby ruby-dev rubygems build-essential
          gem install fpm --no-document

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -buildvcs=false -trimpath -ldflags="-s -w -X main.version=$VERSION" -o screenshooter-mcp ./cmd/screenshooter-mcp-server

      - name: Create server package
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"

          mkdir -p pkg/usr/bin
          mkdir -p pkg/etc/screenshooter-mcp
          mkdir -p pkg/lib/systemd/system
          mkdir -p control

          cp screenshooter-mcp pkg/usr/bin/screenshooter-mcp-server
          echo '{"log_level":"info","color":"auto","listen":"127.0.0.1:11777"}' > pkg/etc/screenshooter-mcp/config.json
          cat > pkg/lib/systemd/system/screenshooter-mcp.service << 'SYSTEMD'
          [Unit]
          Description=Screenshooter MCP Server
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/bin/screenshooter-mcp-server --listen 127.0.0.1:11777
          Restart=on-failure
          User=screenshooter-mcp
          Group=screenshooter-mcp

          [Install]
          WantedBy=multi-user.target
          SYSTEMD

          cat > control/postinst << 'POSTINST'
          #!/bin/sh
          deb-systemd-helper stop screenshooter-mcp 2>/dev/null || true
          if ! id -u screenshooter-mcp >/dev/null 2>&1; then
            useradd -r -s /sbin/nologin screenshooter-mcp
          fi
          systemctl daemon-reload || true
          deb-systemd-helper unmask screenshooter-mcp || true
          deb-systemd-helper purge screenshooter-mcp || true
          deb-systemd-helper enable screenshooter-mcp || true
          deb-systemd-helper restart screenshooter-mcp || true
          POSTINST

          cat > control/prerm << 'PRERM'
          #!/bin/sh
          deb-systemd-helper stop screenshooter-mcp 2>/dev/null || true
          if id -u screenshooter-mcp >/dev/null 2>&1; then
            deluser --system screenshooter-mcp
            delgroup --system --only-if-empty screenshooter-mcp 
          fi
          PRERM

          fpm -s dir -t deb \
            -C pkg \
            -n screenshooter-mcp-server \
            -v "$VERSION" \
            --architecture ${{ matrix.arch }} \
            --description "Screenshooter MCP Server (HTTP mode)" \
            --maintainer "Emmanuel Deloget <emmanuel@deloget.com>" \
            --url "https://github.com/emmanuel-deloget/screenshooter-mcp" \
            --license MIT \
            --vendor "Emmanuel Deloget" \
            --depends systemd \
            --after-install control/postinst \
            --before-remove control/prerm

      - name: Create stdio package
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"

          mkdir -p pkg/usr/bin
          mkdir -p pkg/etc/screenshooter-mcp

          cp screenshooter-mcp pkg/usr/bin/screenshooter-mcp-stdio
          echo '{"log_level":"info","color":"auto"}' > pkg/etc/screenshooter-mcp/config.json

          fpm -s dir -t deb \
            -C pkg \
            -n screenshooter-mcp-stdio \
            -v "$VERSION" \
            --architecture ${{ matrix.arch }} \
            --description "Screenshooter MCP (stdio mode)" \
            --maintainer "Emmanuel Deloget <emmanuel@deloget.com>" \
            --url "https://github.com/emmanuel-deloget/screenshooter-mcp" \
            --license MIT \
            --vendor "Emmanuel Deloget"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-${{ matrix.arch }}
          path: "*.deb"

  build-fedora:
    name: Build Fedora
    runs-on: ubuntu-latest
    container: fedora:41
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
          - arch: aarch64
            goarch: arm64
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          dnf install -y ruby ruby-devel gcc rpm-build @development-tools
          gem install fpm --no-document

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -buildvcs=false -trimpath -ldflags="-s -w -X main.version=$VERSION" -o screenshooter-mcp ./cmd/screenshooter-mcp-server

      - name: Create server package
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"
          ARCH=${{ matrix.arch }}

          mkdir -p pkg/usr/bin
          mkdir -p pkg/etc/screenshooter-mcp
          mkdir -p pkg/usr/lib/systemd/system
          mkdir control

          cp screenshooter-mcp pkg/usr/bin/screenshooter-mcp-server
          echo '{"log_level":"info","color":"auto","listen":"127.0.0.1:11777"}' > pkg/etc/screenshooter-mcp/config.json
          cat > pkg/usr/lib/systemd/system/screenshooter-mcp.service << 'SYSTEMD'
          [Unit]
          Description=Screenshooter MCP Server
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/bin/screenshooter-mcp-server --listen 127.0.0.1:11777
          Restart=on-failure
          User=screenshooter-mcp
          Group=screenshooter-mcp

          [Install]
          WantedBy=multi-user.target
          SYSTEMD

          cat > control/postinst << 'POSTINST'
          #!/bin/sh
          systemctl stop screenshooter-mcp 2>/dev/null || true
          if ! id -u screenshooter-mcp >/dev/null 2>&1; then
            useradd -r -s /sbin/nologin screenshooter-mcp
          fi
          systemctl daemon-reload || true
          systemctl unmask screenshooter-mcp || true
          systemctl purge screenshooter-mcp || true
          systemctl enable screenshooter-mcp || true
          systemctl restart screenshooter-mcp || true
          POSTINST

          cat > control/prerm << 'PRERM'
          #!/bin/sh
          systemctl stop screenshooter-mcp 2>/dev/null || true
          if id -u screenshooter-mcp >/dev/null 2>&1; then
            userdel screenshooter-mcp
          fi
          PRERM

          fpm -s dir -t rpm \
            -C pkg \
            -n screenshooter-mcp-server \
            -v "$VERSION" \
            --architecture "$ARCH" \
            --description "Screenshooter MCP Server (HTTP mode)" \
            --maintainer "Emmanuel Deloget <emmanuel@deloget.com>" \
            --url "https://github.com/emmanuel-deloget/screenshooter-mcp" \
            --license MIT \
            --vendor "Emmanuel Deloget" \
            --after-install control/postinst \
            --before-remove control/prerm

      - name: Create stdio package
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"
          ARCH=${{ matrix.arch }}

          mkdir -p pkg/usr/bin
          mkdir -p pkg/etc/screenshooter-mcp
          cp screenshooter-mcp pkg/usr/bin/screenshooter-mcp-stdio
          echo '{"log_level":"info","color":"auto"}' > pkg/etc/screenshooter-mcp/config.json

          fpm -s dir -t rpm \
            -C pkg \
            -n screenshooter-mcp-stdio \
            -v "$VERSION" \
            --architecture "$ARCH" \
            --description "Screenshooter MCP (stdio mode)" \
            --maintainer "Emmanuel Deloget <emmanuel@deloget.com>" \
            --url "https://github.com/emmanuel-deloget/screenshooter-mcp" \
            --license MIT \
            --vendor "Emmanuel Deloget"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-${{ matrix.arch }}
          path: "*.rpm"

  build-arch:
    name: Build Arch
    runs-on: ubuntu-latest
    container: archlinux:latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
          - arch: aarch64
            goarch: arm64
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm gcc make

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -buildvcs=false -trimpath -ldflags="-s -w -X main.version=$VERSION" -o screenshooter-mcp ./cmd/screenshooter-mcp-server

      - name: Create server package
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"
          ARCH=${{ matrix.arch }}

          mkdir -p pkg/usr/bin
          mkdir -p pkg/etc/screenshooter-mcp
          mkdir -p pkg/usr/lib/systemd/system

          cp screenshooter-mcp pkg/usr/bin/screenshooter-mcp-server
          echo '{"log_level":"info","color":"auto","listen":"127.0.0.1:11777"}' > pkg/etc/screenshooter-mcp/config.json
          cat > pkg/usr/lib/systemd/system/screenshooter-mcp.service << 'SYSTEMD'
          [Unit]
          Description=Screenshooter MCP Server
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/bin/screenshooter-mcp-server --listen 127.0.0.1:11777
          Restart=on-failure
          User=screenshooter-mcp
          Group=screenshooter-mcp

          [Install]
          WantedBy=multi-user.target
          SYSTEMD

          cat > PKGBUILD << 'PKGBUILDEOF'
          # Maintainer: Emmanuel Deloget <emmanuel@deloget.com>
          pkgname=screenshooter-mcp-server
          pkgver={{ VERSION }}
          pkgrel=1
          pkgdesc="Screenshooter MCP Server (HTTP mode)"
          arch=("$ARCH")
          url="https://github.com/emmanuel-deloget/screenshooter-mcp"
          license=("MIT")
          makedepends=("go")
          source=("screenshooter-mcp")
          md5sums=("SKIP")

          build() {
            cd "$srcdir"
            mv screenshooter-mcp screenshooter-mcp-server
          }

          package() {
            cd "$srcdir"
            install -Dm755 screenshooter-mcp-server "$pkgdir/usr/bin/screenshooter-mcp-server"
            install -Dm644 etc/screenshooter-mcp/config.json "$pkgdir/etc/screenshooter-mcp/config.json"
            install -Dm644 usr/lib/systemd/system/screenshooter-mcp.service "$pkgdir/usr/lib/systemd/system/screenshooter-mcp.service"
          }
          PKGBUILDEOF

          # Fix architecture in PKGBUILD
          sed -i "s/{{ VERSION }}/$VERSION/g" PKGBUILD
          sed -i "s/\"$ARCH\"/\"$(echo $ARCH | tr '[:lower:]' '[:upper:]')\"/g" PKGBUILD || true

          makepkg

      - name: Create stdio package
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"
          ARCH=${{ matrix.arch }}

          mkdir -p pkg/usr/bin
          cp screenshooter-mcp pkg/usr/bin/screenshooter-mcp-stdio

          cat > PKGBUILD << 'PKGBUILDEOF'
          # Maintainer: Emmanuel Deloget <emmanuel@deloget.com>
          pkgname=screenshooter-mcp-stdio
          pkgver={{ VERSION }}
          pkgrel=1
          pkgdesc="Screenshooter MCP (stdio mode)"
          arch=("$ARCH")
          url="https://github.com/emmanuel-deloget/screenshooter-mcp"
          license=("MIT")
          makedepends=("go")
          source=("screenshooter-mcp")
          md5sums=("SKIP")

          build() {
            cd "$srcdir"
            mv screenshooter-mcp screenshooter-mcp-stdio
          }

          package() {
            cd "$srcdir"
            install -Dm755 screenshooter-mcp-stdio "$pkgdir/usr/bin/screenshooter-mcp-stdio"
          }
          PKGBUILDEOF

          # Fix architecture in PKGBUILD
          sed -i "s/{{ VERSION }}/$VERSION/g" PKGBUILD
          sed -i "s/\"$ARCH\"/\"$(echo $ARCH | tr '[:lower:]' '[:upper:]')\"/g" PKGBUILD || true

          makepkg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arch-${{ matrix.arch }}
          path: "*.pkg.tar.zst"

  build-alpine-apk:
    name: Build Alpine APK
    runs-on: ubuntu-latest
    container: alpine:latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
          - arch: aarch64
            goarch: arm64
    steps:
      - name: Install dependencies
        run: apk add --no-cache git ca-certificates ruby ruby-dev gcc musl-dev

      - uses: actions/checkout@v5

      - name: Install fpm
        run: gem install fpm --no-document

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build static binary
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -buildvcs=false -trimpath -ldflags="-s -w -X main.version=$VERSION" -o screenshooter-mcp ./cmd/screenshooter-mcp-server

      - name: Create server package
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"

          mkdir -p pkg/usr/local/bin
          mkdir -p pkg/etc/screenshooter-mcp
          mkdir -p pkg/etc/init.d

          cp screenshooter-mcp pkg/usr/local/bin/screenshooter-mcp-server
          echo '{"log_level":"info","color":"auto","listen":"127.0.0.1:11777"}' > pkg/etc/screenshooter-mcp/config.json

          cat > pkg/etc/init.d/screenshooter-mcp << 'INITD'
          #!/sbin/openrc-run

          name="screenshooter-mcp"
          description="Screenshooter MCP Server"
          command="/usr/local/bin/screenshooter-mcp-server"
          command_args="--listen 127.0.0.1:11777"
          pidfile="/run/${RC_SVCNAME}.pid"

          depend() {
              need net
          }
          INITD

          chmod 755 pkg/etc/init.d/screenshooter-mcp

          cat > pkg/var/lib/screenshooter-mcp/postinst << 'POSTINST'
          #!/bin/sh
          if ! id -u screenshooter-mcp >/dev/null 2>&1; then
            adduser -D -s /sbin/nologin screenshooter-mcp
          fi
          POSTINST

          fpm -s dir -t apk \
            -C pkg \
            -n screenshooter-mcp-server \
            -v "$VERSION" \
            --architecture ${{ matrix.arch }} \
            --description "Screenshooter MCP Server (HTTP mode)" \
            --maintainer "Emmanuel Deloget <emmanuel@deloget.com>" \
            --url "https://github.com/emmanuel-deloget/screenshooter-mcp" \
            --license MIT \
            --vendor "Emmanuel Deloget" \
            --replaces "screenshooter-mcp-stdio" \
            --after-install var/lib/screenshooter-mcp/postinst

      - name: Create stdio package
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"

          mkdir -p pkg/usr/local/bin
          cp screenshooter-mcp pkg/usr/local/bin/screenshooter-mcp-stdio

          fpm -s dir -t apk \
            -C pkg \
            -n screenshooter-mcp-stdio \
            -v "$VERSION" \
            --architecture ${{ matrix.arch }} \
            --description "Screenshooter MCP (stdio mode)" \
            --maintainer "Emmanuel Deloget <emmanuel@deloget.com>" \
            --url "https://github.com/emmanuel-deloget/screenshooter-mcp" \
            --license MIT \
            --vendor "Emmanuel Deloget"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpine-apk-${{ matrix.arch }}
          path: "*.apk"

  release:
    name: Attach to Release
    runs-on: ubuntu-latest
    needs:
      - build-alpine
      - build-debian
      - build-fedora
      - build-arch
      - build-alpine-apk

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.event.release.tag_name }}
          files: dist/**/*