name: Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g., v1.0.0)
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

env:
  GO_VERSION: '1.26'

jobs:
  build-static:
    name: Static Build (musl static)
    runs-on: ubuntu-latest
    container: alpine:latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
          - arch: aarch64
            goarch: arm64
    steps:
      - name: Install dependencies
        run: apk add --no-cache git ca-certificates

      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build static binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -buildvcs=false -trimpath -ldflags="-s -w" -o screenshooter-mcp ./cmd/screenshooter-mcp-server

      - name: Create tar.gz (server)
        run: |
          mkdir -p screenshooter-mcp-${{ matrix.arch }}-server
          mkdir -p screenshooter-mcp-${{ matrix.arch }}-server/dot.local/share/gnome-shell/extensions/legacy
          mkdir -p screenshooter-mcp-${{ matrix.arch }}-server/dot.local/share/gnome-shell/extensions/modern
          cp -fpR gnome-extension/screenshooter-mcp@deloget.com_legacy screenshooter-mcp-${{ matrix.arch }}-server/dot.local/share/gnome-shell/extensions/legacy/screenshooter-mcp@deloget.com
          cp -fpR gnome-extension/screenshooter-mcp@deloget.com_modern screenshooter-mcp-${{ matrix.arch }}-server/dot.local/share/gnome-shell/extensions/modern/screenshooter-mcp@deloget.com
          cat > README.txt << 'EOF'
          # For gnome users
          
          ## Allowing screenshots
          The first time the server will want to take a screenshot, it will ask for the authorization to the user
          through a modal dialog. You can bypass this requirement in advance by using the following command line: 
          
          ```shell
          gdbus call --session \
            --dest org.freedesktop.impl.portal.PermissionStore \
            --object-path /org/freedesktop/impl/portal/PermissionStore \
            --method org.freedesktop.impl.portal.PermissionStore.Set \
            "screenshot" true "screenshot" "{'': ['yes']}" "<byte 0x00>"
          ```
          
          Keep in mind that this command line enables all applications to take screenshots (which is the
          behavior of the authorization modal too).
          
          ## The gnome extension 'screenshooter-mcp@deloget.com'
          If you are using gnome 43/44, please copy the content of dot.local/share/gnome-shell/extensions/legacy/
          into your own .local/share/gnome-shell/extenstions/ directory. If you are using gnome 45+, please use
          the content of dot.local/share/gnome-shell/extensions/modern/ instead.
          
          Once the extension has been copied, you need to log out from your graphical session and log back again
          before you can enable the extension:
          
          ```shell
          gnome-extensions enable screenshooter-mcp@deloget.com
          ```
          EOF
          cp screenshooter-mcp screenshooter-mcp-${{ matrix.arch }}-server/
          mkdir -p screenshooter-mcp-${{ matrix.arch }}-server/etc/screenshooter-mcp
          echo '{"log_level":"info","color":"auto","listen":"127.0.0.1:11777"}' > screenshooter-mcp-${{ matrix.arch }}-server/etc/screenshooter-mcp/config.json
          tar -czvf screenshooter-mcp-${{ matrix.arch }}-server-static.tar.gz screenshooter-mcp-${{ matrix.arch }}-server/

      - name: Create tar.gz (stdio)
        run: |
          mkdir -p screenshooter-mcp-${{ matrix.arch }}-stdio
          mkdir -p screenshooter-mcp-${{ matrix.arch }}-stdio/dot.local/share/gnome-shell/extensions/legacy
          mkdir -p screenshooter-mcp-${{ matrix.arch }}-stdio/dot.local/share/gnome-shell/extensions/modern
          cp -fpR gnome-extension/screenshooter-mcp@deloget.com_legacy screenshooter-mcp-${{ matrix.arch }}-stdio/dot.local/share/gnome-shell/extensions/legacy/screenshooter-mcp@deloget.com
          cp -fpR gnome-extension/screenshooter-mcp@deloget.com_modern screenshooter-mcp-${{ matrix.arch }}-stdio/dot.local/share/gnome-shell/extensions/modern/screenshooter-mcp@deloget.com
          cat > README.txt << 'EOF'
          # For gnome users
          
          ## Allowing screenshots
          The first time the server will want to take a screenshot, it will ask for the authorization to the user
          through a modal dialog. You can bypass this requirement in advance by using the following command line: 
          
          ```shell
          gdbus call --session \
            --dest org.freedesktop.impl.portal.PermissionStore \
            --object-path /org/freedesktop/impl/portal/PermissionStore \
            --method org.freedesktop.impl.portal.PermissionStore.Set \
            "screenshot" true "screenshot" "{'': ['yes']}" "<byte 0x00>"
          ```
          
          Keep in mind that this command line enables all applications to take screenshots (which is the
          behavior of the authorization modal too).
          
          ## The gnome extension 'screenshooter-mcp@deloget.com'
          If you are using gnome 43/44, please copy the content of dot.local/share/gnome-shell/extensions/legacy/
          into your own .local/share/gnome-shell/extenstions/ directory. If you are using gnome 45+, please use
          the content of dot.local/share/gnome-shell/extensions/modern/ instead.
          
          Once the extension has been copied, you need to log out from your graphical session and log back again
          before you can enable the extension:
          
          ```shell
          gnome-extensions enable screenshooter-mcp@deloget.com
          ```
          EOF
          cp screenshooter-mcp screenshooter-mcp-${{ matrix.arch }}-stdio/
          tar -czvf screenshooter-mcp-${{ matrix.arch }}-stdio-static.tar.gz screenshooter-mcp-${{ matrix.arch }}-stdio/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpine-${{ matrix.arch }}
          path: |
            screenshooter-mcp-${{ matrix.arch }}-server-static.tar.gz
            screenshooter-mcp-${{ matrix.arch }}-stdio-static.tar.gz

  build-debian:
    name: Build Debian
    runs-on: ubuntu-latest
    container: debian:bookworm-slim
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y ruby ruby-dev rubygems build-essential
          gem install fpm --no-document

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -buildvcs=false -trimpath -ldflags="-s -w -X main.version=$VERSION" -o screenshooter-mcp ./cmd/screenshooter-mcp-server

      - name: Create server package
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"

          mkdir -p pkg/usr/bin
          mkdir -p pkg/etc/screenshooter-mcp
          mkdir -p pkg/etc/xdg/autostart
          mkdir -p pkg/usr/lib/systemd/user
          mkdir -p pkg/usr/lib/screenshooter-mcp
          mkdir -p pkg/usr/share/screenshooter-mcp/extensions/
          mkdir -p control
          
          cp -fpR gnome-extension/* pkg/usr/share/screenshooter-mcp/extensions/

          echo '{"log_level":"info","color":"auto","listen":"127.0.0.1:11777"}' > pkg/etc/screenshooter-mcp/config.json

          cp scripts/packaging/com.deloget.ScreenshooterMCP-server.desktop pkg/etc/xdg/autostart/com.deloget.ScreenshooterMCP.desktop 
          cp scripts/packaging/authorize-portal.sh pkg/usr/lib/screenshooter-mcp/authorize-portal.sh 
          cp scripts/packaging/screenshooter-mcp-server.service pkg/usr/lib/systemd/user/screenshooter-mcp.service
          cp screenshooter-mcp pkg/usr/bin/screenshooter-mcp-server

          cp scripts/packaging/debian-postinst-server.sh control/postinst
          cp scripts/packaging/debian-prerm-server.sh control/prerm

          chmod 755 pkg/usr/lib/screenshooter-mcp/authorize-portal.sh
          chmod 755 pkg/usr/bin/screenshooter-mcp-server
          chmod 755 control/postinst
          chmod 755 control/prerm

          fpm -s dir -t deb \
            -C pkg \
            -n screenshooter-mcp-server \
            -v "$VERSION" \
            --architecture ${{ matrix.arch }} \
            --description "Screenshooter MCP Server (HTTP mode)" \
            --maintainer "Emmanuel Deloget <emmanuel@deloget.com>" \
            --url "https://github.com/emmanuel-deloget/screenshooter-mcp" \
            --license MIT \
            --vendor "Emmanuel Deloget" \
            --depends systemd \
            --after-install control/postinst \
            --before-remove control/prerm

      - name: Create stdio package
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"

          mkdir -p pkg/usr/bin
          mkdir -p pkg/etc/screenshooter-mcp

          cp screenshooter-mcp pkg/usr/bin/screenshooter-mcp-stdio
          echo '{"log_level":"info","color":"auto"}' > pkg/etc/screenshooter-mcp/config.json

          fpm -s dir -t deb \
            -C pkg \
            -n screenshooter-mcp-stdio \
            -v "$VERSION" \
            --architecture ${{ matrix.arch }} \
            --description "Screenshooter MCP (stdio mode)" \
            --maintainer "Emmanuel Deloget <emmanuel@deloget.com>" \
            --url "https://github.com/emmanuel-deloget/screenshooter-mcp" \
            --license MIT \
            --vendor "Emmanuel Deloget"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-${{ matrix.arch }}
          path: "*.deb"

  build-fedora:
    name: Build Fedora
    runs-on: ubuntu-latest
    container: fedora:43
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
          - arch: aarch64
            goarch: arm64
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          dnf install -y ruby ruby-devel gcc rpm-build @development-tools
          gem install fpm --no-document

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -buildvcs=false -trimpath -ldflags="-s -w -X main.version=$VERSION" -o screenshooter-mcp ./cmd/screenshooter-mcp-server

      - name: Create server package
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"
          ARCH=${{ matrix.arch }}

          mkdir -p pkg/usr/bin
          mkdir -p pkg/etc/screenshooter-mcp
          mkdir -p pkg/etc/xdg/autostart
          mkdir -p pkg/usr/lib/systemd/user
          mkdir -p pkg/usr/lib/screenshooter-mcp
          mkdir -p pkg/usr/share/screenshooter-mcp/extensions/
          mkdir -p control

          cp -fpR gnome-extension/* pkg/usr/share/screenshooter-mcp/extensions/

          echo '{"log_level":"info","color":"auto","listen":"127.0.0.1:11777"}' > pkg/etc/screenshooter-mcp/config.json

          cp scripts/packaging/com.deloget.ScreenshooterMCP-server.desktop pkg/etc/xdg/autostart/com.deloget.ScreenshooterMCP.desktop 
          cp scripts/packaging/authorize-portal.sh pkg/usr/lib/screenshooter-mcp/authorize-portal.sh 
          cp scripts/packaging/screenshooter-mcp-server.service pkg/usr/lib/systemd/user/screenshooter-mcp.service
          cp screenshooter-mcp pkg/usr/bin/screenshooter-mcp-server

          cp scripts/packaging/fedora-postinst-server.sh control/postinst
          cp scripts/packaging/fedora-prerm-server.sh control/prerm

          chmod 755 pkg/usr/lib/screenshooter-mcp/authorize-portal.sh
          chmod 755 pkg/usr/bin/screenshooter-mcp-server
          chmod 755 control/postinst
          chmod 755 control/prerm

          fpm -s dir -t rpm \
            -C pkg \
            -n screenshooter-mcp-server \
            -v "$VERSION" \
            --architecture "$ARCH" \
            --description "Screenshooter MCP Server (HTTP mode)" \
            --maintainer "Emmanuel Deloget <emmanuel@deloget.com>" \
            --url "https://github.com/emmanuel-deloget/screenshooter-mcp" \
            --license MIT \
            --vendor "Emmanuel Deloget" \
            --depends systemd \
            --after-install control/postinst \
            --before-remove control/prerm

      - name: Create stdio package
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || 'dev' }}"
          VERSION="${VERSION#v}"
          ARCH=${{ matrix.arch }}

          mkdir -p pkg/usr/bin
          mkdir -p pkg/etc/screenshooter-mcp
          cp screenshooter-mcp pkg/usr/bin/screenshooter-mcp-stdio
          echo '{"log_level":"info","color":"auto"}' > pkg/etc/screenshooter-mcp/config.json

          fpm -s dir -t rpm \
            -C pkg \
            -n screenshooter-mcp-stdio \
            -v "$VERSION" \
            --architecture "$ARCH" \
            --description "Screenshooter MCP (stdio mode)" \
            --maintainer "Emmanuel Deloget <emmanuel@deloget.com>" \
            --url "https://github.com/emmanuel-deloget/screenshooter-mcp" \
            --license MIT \
            --vendor "Emmanuel Deloget"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-${{ matrix.arch }}
          path: "*.rpm"

  release:
    name: Attach to Release
    runs-on: ubuntu-latest
    needs:
      - build-static
      - build-debian
      - build-fedora

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version || github.event.release.tag_name }}
          files: dist/**/*