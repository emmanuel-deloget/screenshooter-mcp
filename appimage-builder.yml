version: 1

script:
  - echo "=== Installing SVG conversion tools ==="
  - apt-get update -qq && apt-get install -y -qq librsvg2-bin imagemagick

  - echo "=== Cleaning previous build ==="
  - rm -rf AppDir | true
  - mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/icons/hicolor/48x48/apps

  - echo "=== Converting SVG icon to PNG ==="
  - python3 assets/icons/convert_icon.py || echo "Icon conversion failed, using placeholder"

  - echo "=== Cleaning up build tools from AppDir ==="
  - rm -rf AppDir/usr/bin/convert* AppDir/usr/bin/identify* AppDir/usr/bin/mogrify* AppDir/usr/bin/display* AppDir/usr/bin/animate* AppDir/usr/bin/composite* AppDir/usr/bin/conjure* AppDir/usr/bin/import* AppDir/usr/bin/stream* AppDir/usr/bin/montage* AppDir/usr/bin/compare* AppDir/usr/bin/ffmpeg AppDir/usr/bin/gs AppDir/usr/bin/gsandbox* AppDir/usr/bin/lib* 2>/dev/null || true
  - rm -rf AppDir/usr/lib/x86_64-linux-gnu/ImageMagick* AppDir/usr/lib/x86_64-linux-gnu/graphics* 2>/dev/null || true

  - echo "=== Copying Go server binary ==="
  - cp screenshooter-mcp-server AppDir/usr/bin/
  - chmod +x AppDir/usr/bin/screenshooter-mcp-server

  - echo "=== Copying Ollama binary ==="
  - cp bin/ollama/bin/ollama AppDir/usr/bin/
  - chmod 0755 AppDir/usr/bin/ollama

  - echo "=== Copying Ollama libraries (excluding CUDA) ==="
  - cp -r bin/ollama/lib/ollama/* AppDir/usr/lib/
  - echo "=== Removing CUDA libraries to reduce size ==="
  - rm -rf AppDir/usr/lib/cuda_v12 AppDir/usr/lib/cuda_v13 AppDir/usr/lib/mlx_cuda_v13

  - echo "=== Fixing library permissions ==="
  - find AppDir/usr/lib -type f -name "*.so*" -exec chmod 0644 {} \; 2>/dev/null || true

  - echo "=== Ensuring execute permissions ==="
  - chmod 0755 AppDir/usr/bin/ollama
  - chmod 0755 AppDir/usr/bin/screenshooter-mcp-server

AppDir:
  path: ./AppDir

  app_info:
    id: com.screenshooter.mcp
    name: screenshooter-mcp
    icon: com.screenshooter.mcp
    version: "0.1.0"
    exec: usr/bin/screenshooter-mcp-server
    exec_args: $@

  runtime:
    env:
      OLLAMA_LIB_PATH: $APPDIR/usr/lib
      OLLAMA_LIBRARY_PATH: $APPDIR/usr/lib
      OLLAMA_PATH: $APPDIR/usr/bin
      LD_LIBRARY_PATH: $APPDIR/usr/lib:$LD_LIBRARY_PATH

  apt:
    arch: amd64
    allow_unauthenticated: true
    sources:
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ noble main restricted universe multiverse'
        key_url: 'http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920d1991bc93c'
    include: []
    exclude:
      - libc6
      - libc6-dev
      - libgcc-s1
      - gcc-14-base
      - zlib1g
      - libstdc++6

  files:
    include: []
    exclude:
      - usr/share/man
      - usr/share/doc
      - usr/include
      - usr/sbin

AppImage:
  arch: x86_64
  update-information: None